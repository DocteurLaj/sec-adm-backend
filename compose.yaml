services:
  mysql:
    image: mysql:8.4
    container_name: sec-adm-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-sec_adm}
      MYSQL_USER: ${MYSQL_USER:-sec_adm_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-sec_adm_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-sec_root_password}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
    container_name: sec-adm-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-mysql+pymysql://sec_adm_user:sec_adm_password@mysql:3306/sec_adm}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-secret-in-production}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-120}
      FIRST_ADMIN_EMAIL: ${FIRST_ADMIN_EMAIL:-admin@sec.local}
      FIRST_ADMIN_PASSWORD: ${FIRST_ADMIN_PASSWORD:-admin12345}
      FIRST_ADMIN_FULL_NAME: ${FIRST_ADMIN_FULL_NAME:-SEC Admin}
    ports:
      - "8100:8000"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
